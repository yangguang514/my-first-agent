        --accent-dark: #145a43;

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        color: var(--text);
        background:
          linear-gradient(135deg, rgba(31, 122, 91, 0.14), rgba(49, 108, 154, 0.1)),
          var(--bg);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;

      button,

      .app-shell {
        height: 100vh;
        padding: 24px;
        overflow: hidden;
      }

      .workspace {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        width: min(1180px, 100%);
        height: calc(100vh - 48px);
        min-height: 0;
        margin: 0 auto;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(216, 226, 215, 0.85);

      .brand-mark {

        height: 48px;

        background: rgba(255, 255, 255, 0.12);
        font-size: 24px;
        font-weight: 800;

      .brand h1,
      .chat-header h2 {

        letter-spacing: 0;
      }

      .brand h1 {
        font-size: 24px;
      }

      .brand p,

        font-size: 14px;
        line-height: 1.5;

      .brand p {

        width: 100%;
        min-height: 44px;
        border: 1px solid rgba(255, 255, 255, 0.34);
        border-radius: 8px;
        color: #f7fff9;
        background: rgba(255, 255, 255, 0.14);
        cursor: pointer;
        font-weight: 800;
      }

      .conversation-section {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 10px;
        min-height: 170px;
      }

      .side-heading {
        color: rgba(255, 255, 255, 0.68);
        font-size: 12px;
        font-weight: 800;

      .conversation-list {

        align-content: start;
        gap: 8px;
        min-height: 0;
        max-height: 34vh;
        overflow-y: auto;
        padding-right: 2px;

      .conversation-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 32px;
        gap: 6px;
        align-items: stretch;
      }

      .conversation-open,
      .conversation-delete {
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 8px;
        color: #f7fff9;
        background: rgba(255, 255, 255, 0.08);
        cursor: pointer;
      }

      .conversation-open {
        display: grid;
        gap: 3px;
        min-width: 0;
        padding: 10px 11px;
        text-align: left;
      }

      .conversation-delete {
        display: grid;
        place-items: center;
        width: 32px;
        color: rgba(255, 255, 255, 0.68);
        font-weight: 800;
      }

      .conversation-delete:hover,
      .new-chat-button:hover {
        background: rgba(255, 255, 255, 0.18);

      .conversation-item.active .conversation-open {
        border-color: rgba(255, 255, 255, 0.42);
      }

      .conversation-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;

        font-weight: 700;

      .conversation-meta {
        color: rgba(255, 255, 255, 0.58);
        font-size: 12px;
      }

      .capability-list {
        display: grid;
        gap: 12px;
        margin-top: auto;
      }

      .capability-list div {
        padding: 14px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.1);
      }

      .capability-list strong,
      .capability-list span {
        display: block;
      }

      .capability-list strong {
        font-size: 15px;
      }

      .capability-list span {
        margin-top: 5px;
        color: rgba(255, 255, 255, 0.74);
        font-size: 13px;
        line-height: 1.5;
      }

      .chat-panel {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto auto;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: var(--panel);
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 22px 24px;

      .chat-header h2 {
        font-size: 20px;
      }

      .chat-header p {
        color: var(--muted);
      }

      .icon-button {
        display: grid;
        place-items: center;
        width: 40px;
        height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--muted);
        background: var(--panel-strong);
        cursor: pointer;
      }

      .messages {
        display: flex;
        flex-direction: column;
        gap: 18px;
        min-height: 0;
        padding: 24px;
        overflow-y: auto;
        scroll-behavior: smooth;
      }

      .message {
        display: grid;
        gap: 8px;
        max-width: 88%;
      }

      .message.user {
        align-self: flex-end;
      }

      .message.assistant {
        align-self: flex-start;
      }

      .message-label {
        color: var(--muted);

        font-weight: 700;

      .bubble {
        padding: 14px 16px;
        border-radius: 8px;
        line-height: 1.72;
      }

      .user .bubble {
        color: #ffffff;
        background: var(--accent);
      }

      .assistant .bubble {
        border: 1px solid var(--line);
        background: var(--panel-strong);
      }

      .bubble p {
        margin: 0 0 10px;
      }

      .bubble p:last-child {
        margin-bottom: 0;
      }

      .bubble h1,
      .bubble h2,
      .bubble h3,
      .bubble h4,
      .bubble h5,
      .bubble h6 {
        margin: 14px 0 8px;
        line-height: 1.35;
      }

      .bubble h1:first-child,
      .bubble h2:first-child,
      .bubble h3:first-child,
      .bubble h4:first-child,
      .bubble h5:first-child,
      .bubble h6:first-child {

      .bubble h1 {
        font-size: 24px;
      }

      .bubble h2 {
        font-size: 21px;

      .bubble h3 {
        font-size: 18px;
      }

      .bubble h4,
      .bubble h5,
      .bubble h6 {

      }

      .bubble hr {
        margin: 16px 0;

        border-top: 1px solid var(--line);
      }

      .bubble ul,

      .bubble blockquote {

      .bubble table {

      .bubble th,
      .bubble td {
        padding: 9px 10px;
        border: 1px solid var(--line);

        vertical-align: top;
      }

      .bubble th {
        background: #e8f2ec;
      }

      .bubble code {

        border-radius: 4px;
        background: #e5ece7;
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", monospace;

      }

      .source-list {
        display: grid;
        gap: 8px;
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid var(--line);
      }

      .source-list a {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        align-items: start;
        padding: 8px 10px;
        border: 1px solid #dce8dd;
        border-radius: 8px;
        color: var(--accent-dark);
        background: #ffffff;
        text-decoration: none;
        font-size: 13px;
      }

      .source-list strong {
        overflow-wrap: anywhere;
      }

      .examples {
        display: flex;
        gap: 8px;
        padding: 0 24px 16px;
        overflow-x: auto;
      }

      .examples button {
        flex: 0 0 auto;
        max-width: 280px;
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--text);
        background: #fbfdfb;
        cursor: pointer;
        font-size: 13px;
        white-space: nowrap;
      }

      .composer {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 12px;
        padding: 18px 24px 24px;
        border-top: 1px solid var(--line);
        background: #fbfdfb;
      }

      .composer textarea {
        width: 100%;
        min-height: 52px;
        max-height: 160px;
        padding: 13px 14px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        outline: none;
        line-height: 1.5;
      }

      .composer button {
        align-self: stretch;
        min-width: 92px;
        border: 0;
        border-radius: 8px;
        color: #ffffff;
        background: var(--accent);
        cursor: pointer;
        font-weight: 700;
      }

      .composer button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .typing {
        display: inline-flex;
        gap: 5px;
        align-items: center;
      }

      .typing span {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--blue);
        animation: bounce 1s infinite ease-in-out;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.15s;
      }

      .typing span:nth-child(3) {
        animation-delay: 0.3s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-4px);
          opacity: 1;
        }
      }

      @media (max-width: 820px) {
        .app-shell {
          padding: 0;
        }

        .workspace {
          grid-template-columns: 1fr;
          height: 100vh;
          border: 0;
          border-radius: 0;
        }

        .side-panel {
          padding: 20px;
        }

        .capability-list {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .message {
          max-width: 100%;
        }

        .composer {
          grid-template-columns: 1fr;
        }

        .composer button {
          min-height: 44px;
        }
      }
    </style>

          transform: translateX(-105%);
          transition: transform 240ms ease;
        }

        body.sidebar-open .side-panel { transform: translateX(0); }

        .mobile-backdrop {
          position: fixed;
          inset: 0;
          z-index: 15;
          display: block;
          border: 0;
          background: rgba(24, 31, 26, 0.48);
          opacity: 0;
          pointer-events: none;
          backdrop-filter: blur(2px);
        }

        body.sidebar-open .mobile-backdrop { opacity: 1; pointer-events: auto; }
        .chat-panel { height: 100dvh; }
        .chat-header { min-height: 72px; padding: 13px 16px; }
        .chat-header p { display: none; }
        .header-actions { flex-direction: row-reverse; }
        .menu-button { display: grid; }
        .messages { padding: 24px 16px; }
        .message.assistant { width: 100%; max-width: 100%; }
        .message.user { width: fit-content; max-width: 88%; }
        .examples { padding: 0 16px 11px; }
        .examples button { max-width: 76vw; }

        .composer {
          grid-template-columns: minmax(0, 1fr) auto;
          padding: 12px 16px max(14px, env(safe-area-inset-bottom));
        }

        .composer button { min-width: 68px; min-height: 50px; }
        .capability-list { display: none; }
      }

      @media (max-width: 480px) {
        .chat-header h2 {
          max-width: 48vw;
          overflow: hidden;
          font-size: 20px;
          text-overflow: ellipsis;
          white-space: nowrap;
        }
        .empty-state { padding-bottom: 4vh; }
        .empty-state h3 { font-size: 36px; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#messages">跳到对话内容</a>
    <main class="app-shell">
      <section class="workspace" aria-label="AnimalAgent 对话区">
        <aside class="side-panel" aria-label="会话导航">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">A</div>
            <div>
              <h1>AnimalAgent</h1>
              <p>联网检索 · 来源标注 · 会话保存</p>
            </div>
          </div>

          <button id="newChat" class="new-chat-button" type="button">＋ 新建对话</button>

          <section class="conversation-section" aria-label="历史对话">
            <div class="side-heading">最近对话</div>
            <div id="conversationList" class="conversation-list"></div>
          </section>

          <div class="capability-list" aria-label="核心能力">
            <div><strong>物种百科</strong><span>学名、栖息地、食性、保护现状</span></div>
            <div><strong>行为解码</strong><span>从演化动机解释动物行为</span></div>
            <div><strong>物种对比</strong><span>用结构化信息分辨相似动物</span></div>
            <div><strong>生态关联</strong><span>把物种放回真实生态位</span></div>
          </div>
        </aside>

        <section class="chat-panel">
          <header class="chat-header">
            <div>
              <h2 id="chatTitle">动物学问答</h2>
              <p>提出问题，回答会实时生成并自动保存</p>
            </div>
            <div class="header-actions">
              <button id="menuButton" class="icon-button menu-button" type="button" title="打开会话列表" aria-label="打开会话列表">
                <span aria-hidden="true">☰</span>
              </button>
              <button id="clearChat" class="icon-button" type="button" title="清空当前对话" aria-label="清空当前对话">
                <span aria-hidden="true">清</span>
              </button>
            </div>
          </header>

          <div id="messages" class="messages" aria-live="polite"></div>

          <div class="examples" aria-label="示例问题">
            <button type="button">介绍一下雪豹，它和花豹有什么区别？</button>
            <button type="button">猫为什么会踩奶？</button>
            <button type="button">花豹和美洲豹怎么快速分辨？</button>
            <button type="button">海獭减少会怎样影响海带森林？</button>
          </div>

          <form id="chatForm" class="composer">
            <textarea
              id="promptInput"
              rows="2"
              placeholder="输入动物、行为或物种对比问题..."
              aria-label="输入问题"
              required
            ></textarea>
            <button id="sendButton" type="submit">发送</button>
          </form>
        </section>
      </section>
    </main>
    <button id="mobileBackdrop" class="mobile-backdrop" type="button" aria-label="关闭会话列表"></button>

    <script>
      const activeKey = "animal-agent-active-conversation-id";
      const legacyStoreKey = "animal-agent-chat-store-v1";
      const els = {
        list: document.querySelector("#conversationList"),
        messages: document.querySelector("#messages"),
        form: document.querySelector("#chatForm"),
        input: document.querySelector("#promptInput"),
        send: document.querySelector("#sendButton"),
        clear: document.querySelector("#clearChat"),
        create: document.querySelector("#newChat"),
        menu: document.querySelector("#menuButton"),
        backdrop: document.querySelector("#mobileBackdrop"),
        title: document.querySelector("#chatTitle"),
        examples: document.querySelectorAll(".examples button")
      };

      const state = {
        conversations: [],
        activeId: localStorage.getItem(activeKey) || "",
        activeConversation: null,
        streamingIndex: -1,
        busy: false
      };

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function renderInline(text) {
        const codeSpans = [];
        const escaped = escapeHtml(text).replace(/`([^`]+?)`/g, (_, code) => {
          const token = `\u0000CODE${codeSpans.length}\u0000`;
          codeSpans.push(`<code>${code}</code>`);
          return token;
        });

        return escaped
          .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
          .replace(/__(.+?)__/g, "<strong>$1</strong>")
          .replace(/(^|[^\w*])\*([^*\n]+?)\*(?=[^\w*]|$)/g, "$1<em>$2</em>")
          .replace(/(^|[^\w_])_([^_\n]+?)_(?=[^\w_]|$)/g, "$1<em>$2</em>")
          .replace(/\u0000CODE(\d+)\u0000/g, (_, index) => codeSpans[Number(index)] || "");
      }

      function renderTable(lines, startIndex) {
        const rows = [];
        let index = startIndex;
        while (index < lines.length && /^\|.+\|$/.test(lines[index].trim())) {
          rows.push(lines[index].trim());
          index += 1;
        }
        if (rows.length < 2) return null;
        const divider = rows[1].split("|").slice(1, -1).every((cell) => /^:?-{3,}:?$/.test(cell.trim()));
        if (!divider) return null;
        const header = rows[0].split("|").slice(1, -1).map((cell) => renderInline(cell.trim()));
        const bodyRows = rows.slice(2).map((row) => row.split("|").slice(1, -1).map((cell) => renderInline(cell.trim())));
        const thead = `<thead><tr>${header.map((cell) => `<th>${cell}</th>`).join("")}</tr></thead>`;
        const tbody = `<tbody>${bodyRows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>`).join("")}</tbody>`;
        return { html: `<table>${thead}${tbody}</table>`, nextIndex: index };
      }

      function renderMarkdown(markdown) {
        const lines = String(markdown || "").split(/\r?\n/);
        const blocks = [];
        let list = null;
        const closeList = () => {
          if (!list) return;
          blocks.push(`<${list.type}>${list.items.map((item) => `<li>${item}</li>`).join("")}</${list.type}>`);
          list = null;
        };

        for (let index = 0; index < lines.length; index += 1) {
          const line = lines[index].trim();
          const table = renderTable(lines, index);
          if (table) {
            closeList();
            blocks.push(table.html);
            index = table.nextIndex - 1;
            continue;
          }
          if (!line) {
            closeList();
            continue;
          }
          if (/^[-*_]{3,}$/.test(line)) {
            closeList();
            blocks.push("<hr>");
            continue;
          }
          const heading = line.match(/^(#{1,6})\s+(.+)$/);
          if (heading) {
            closeList();
            const level = heading[1].length;
            blocks.push(`<h${level}>${renderInline(heading[2])}</h${level}>`);
            continue;
          }
          if (line.startsWith(">")) {
            closeList();
            const quote = line.replace(/^>\s?/, "").trim();
            if (quote) blocks.push(`<blockquote>${renderInline(quote)}</blockquote>`);
            continue;
          }
          const unordered = line.match(/^[-*]\s+(.+)/);
          if (unordered) {
            if (!list || list.type !== "ul") {
              closeList();
              list = { type: "ul", items: [] };
            }
            list.items.push(renderInline(unordered[1]));
            continue;
          }
          const ordered = line.match(/^\d+\.\s+(.+)/);
          if (ordered) {
            if (!list || list.type !== "ol") {
              closeList();
              list = { type: "ol", items: [] };
            }
            list.items.push(renderInline(ordered[1]));
            continue;
          }
          closeList();
          blocks.push(`<p>${renderInline(line)}</p>`);
        }

        closeList();
        return blocks.join("");
      }

      async function parseJson(response) {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.error || "请求失败");
        return data;
      }

      const api = {
        list: () => fetch("/api/conversations").then(parseJson),
        create: () => fetch("/api/conversations", { method: "POST" }).then(parseJson),
        get: (id) => fetch(`/api/conversations/${id}`).then(parseJson),
        clear: (id) => fetch(`/api/conversations/${id}/clear`, { method: "POST" }).then(parseJson),
        delete: (id) => fetch(`/api/conversations/${id}`, { method: "DELETE" }).then(parseJson),
        import: (payload) =>
          fetch("/api/conversations/import", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
          }).then(parseJson)
      };

      async function streamMessage(conversationId, content, onEvent) {
        const response = await fetch(`/api/conversations/${conversationId}/chat/stream`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ content })
        });
        if (!response.ok || !response.body) {
          const data = await response.json().catch(() => ({}));
          throw new Error(data.error || "请求失败");
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          buffer = parseSse(buffer, onEvent);
        }
      }

      function parseSse(buffer, onEvent) {
        const events = buffer.split("\n\n");
        const rest = events.pop() || "";
        for (const eventText of events) {
          const lines = eventText.split("\n");
          const eventName = lines.find((line) => line.startsWith("event:"))?.replace(/^event:\s?/, "") || "message";
          const dataText = lines
            .filter((line) => line.startsWith("data:"))
            .map((line) => line.replace(/^data:\s?/, ""))
            .join("\n");
          if (dataText) onEvent(eventName, JSON.parse(dataText));
        }
        return rest;
      }

      function renderSidebar() {
        return state.conversations
          .map((conversation) => {
            const active = conversation.id === state.activeId ? " active" : "";
            const date = new Date(conversation.updatedAt).toLocaleString("zh-CN", {
              month: "2-digit",
              day: "2-digit",
              hour: "2-digit",
              minute: "2-digit"
            });
            return `
              <div class="conversation-item${active}" data-id="${conversation.id}">
                <button class="conversation-open" type="button" title="${escapeHtml(conversation.title)}">
                  <span class="conversation-title">${escapeHtml(conversation.title)}</span>
                  <span class="conversation-meta">${date}</span>
                </button>
                <button class="conversation-delete" type="button" title="删除对话" aria-label="删除对话">×</button>
              </div>
            `;
          })
          .join("");
      }

      function renderTyping() {
        return `<span class="typing" aria-label="正在生成回答"><span></span><span></span><span></span></span>`;
      }

      function renderSources(sources = []) {
        if (!sources.length) return "";
        return `
          <div class="source-list" aria-label="信息来源">
            ${sources
              .map(
                (source) => `
                  <a href="${escapeHtml(source.url)}" target="_blank" rel="noreferrer">
                    <span>[${source.id}]</span>
                    <strong>${escapeHtml(source.title)}</strong>
                  </a>
                `
              )
              .join("")}
          </div>
        `;
      }

      function renderMessages() {
        const messages = state.activeConversation?.messages || [];
        if (!messages.length) {
          return `
            <section class="empty-state">
              <span class="empty-kicker">FIELD NOTES · 01</span>
              <h3>从一个动物问题开始。</h3>
              <p>问物种特征、行为原因或生态关系。需要检索时，回答会附上可继续阅读的信息来源。</p>
            </section>
          `;
        }
        return messages
          .map((message, index) => {
            const label = message.role === "user" ? "You" : "AnimalAgent";
            const isStreamingMessage = index === state.streamingIndex;
            const isWaitingForContent = isStreamingMessage && !message.content;
            return `
              <article class="message ${message.role}">
                <div class="message-label">${label}</div>
                <div class="bubble">
                  ${isWaitingForContent ? renderTyping() : renderMarkdown(message.content)}
                  ${message.role === "assistant" && !isStreamingMessage ? renderSources(message.sources) : ""}
                </div>
              </article>
            `;
          })
          .join("");
      }

      function render() {
        els.list.innerHTML = renderSidebar();
        els.title.textContent = state.activeConversation?.title || "动物学问答";
        els.messages.innerHTML = renderMessages();
        els.messages.scrollTop = els.messages.scrollHeight;
      }

      async function migrateLegacyConversations() {
        const raw = localStorage.getItem(legacyStoreKey);
        if (!raw) return;
        try {
          const legacy = JSON.parse(raw);
          const conversations = Array.isArray(legacy?.conversations) ? legacy.conversations : [];
          for (const conversation of conversations) {
            const messages = Array.isArray(conversation.messages)
              ? conversation.messages.filter((message) => message && ["user", "assistant"].includes(message.role))
              : [];
            if (messages.some((message) => message.role === "user")) {
              await api.import({ title: conversation.title || "已迁移的对话", messages });
            }
          }
        } finally {
          localStorage.removeItem(legacyStoreKey);
        }
      }

      async function refreshConversationList() {
        const data = await api.list();
        state.conversations = data.conversations || [];
        render();
      }

      async function createAndOpenConversation() {
        const data = await api.create();
        await refreshConversationList();
        await openConversation(data.conversation.id);
      }

      async function openConversation(id) {
        if (state.busy) return;
        const data = await api.get(id);
        state.activeId = data.conversation.id;
        state.activeConversation = data.conversation;
        localStorage.setItem(activeKey, state.activeId);
        document.body.classList.remove("sidebar-open");
        render();
      }

      async function sendCurrentMessage(content) {
        const text = content.trim();
        if (!text || state.busy || !state.activeConversation) return;

        state.busy = true;
        els.send.disabled = true;
        els.input.value = "";

        state.activeConversation.messages.push({ role: "user", content: text, sources: [] });
        state.streamingIndex = state.activeConversation.messages.push({ role: "assistant", content: "", sources: [] }) - 1;
        render();

        try {
          await streamMessage(state.activeId, text, (eventName, data) => {
            const assistant = state.activeConversation.messages[state.streamingIndex];
            if (!assistant) return;
            if (eventName === "sources") assistant.sources = data.sources || [];
            if (eventName === "delta") assistant.content += data.content || "";
            if (eventName === "error") throw new Error(data.message || "流式响应失败");
            if (eventName === "done") {
              state.activeConversation = data.conversation;
              state.streamingIndex = -1;
            }
            render();
          });

          await refreshConversationList();
          await openConversation(state.activeId);
        } catch (error) {
          const assistant = state.activeConversation.messages[state.streamingIndex];
          if (assistant) {
            assistant.content = `**服务暂时不可用**\n\n${error.message}\n\n请检查服务端环境变量、模型密钥、搜索密钥和存储配置。`;
          }
        } finally {
          state.streamingIndex = -1;
          state.busy = false;
          els.send.disabled = false;
          render();
          els.input.focus();
        }
      }

      async function boot() {
        await migrateLegacyConversations();
        await refreshConversationList();
        if (!state.activeId || !state.conversations.some((item) => item.id === state.activeId)) {
          await createAndOpenConversation();
        } else {
          await openConversation(state.activeId);
        }
      }

      els.form.addEventListener("submit", (event) => {
        event.preventDefault();
        sendCurrentMessage(els.input.value);
      });

      els.input.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          els.form.requestSubmit();
        }
      });

      els.create.addEventListener("click", createAndOpenConversation);

      els.menu.addEventListener("click", () => {
        document.body.classList.add("sidebar-open");
      });

      els.backdrop.addEventListener("click", () => {
        document.body.classList.remove("sidebar-open");
      });

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") document.body.classList.remove("sidebar-open");
      });

      els.clear.addEventListener("click", async () => {
        if (!state.activeId || state.busy) return;
        const data = await api.clear(state.activeId);
        state.activeConversation = data.conversation;
        await refreshConversationList();
        render();
      });

      els.list.addEventListener("click", async (event) => {
        const item = event.target.closest(".conversation-item");
        if (!item) return;
        if (event.target.closest(".conversation-delete")) {
          const target = state.conversations.find((conversation) => conversation.id === item.dataset.id);
          if (!target || !confirm(`删除“${target.title}”？此操作不会影响其他对话。`)) return;
          await api.delete(item.dataset.id);
          await refreshConversationList();
          if (item.dataset.id === state.activeId) {
            const next = state.conversations[0];
            if (next) await openConversation(next.id);
            else await createAndOpenConversation();
          }
          return;
        }
        await openConversation(item.dataset.id);
      });

      els.examples.forEach((button) => {
        button.addEventListener("click", () => {
          els.input.value = button.textContent;
          els.input.focus();
        });
      });

      boot().catch((error) => {
        els.messages.innerHTML = `<article class="message assistant"><div class="message-label">AnimalAgent</div><div class="bubble"><p>${escapeHtml(error.message)}</p></div></article>`;
      });
    </script>
  </body>
</html>
