<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimalAgent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="AnimalAgent 对话区">
        <aside class="side-panel">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">A</div>
            <div>
              <h1>AnimalAgent</h1>
              <p>联网检索 + 信源标注 + 后端会话保存</p>
            </div>
          </div>

          <button id="newChat" class="new-chat-button" type="button">新建对话</button>

          <section class="conversation-section" aria-label="历史对话">
            <div class="side-heading">对话</div>
            <div id="conversationList" class="conversation-list"></div>
          </section>

          <div class="capability-list" aria-label="核心能力">
            <div>
              <strong>物种百科</strong>
              <span>学名、栖息地、食性、保护现状</span>
            </div>
            <div>
              <strong>行为解码</strong>
              <span>从演化动机解释古怪行为</span>
            </div>
            <div>
              <strong>跨物种对比</strong>
              <span>用表格快速分辨相似动物</span>
            </div>
            <div>
              <strong>生态链关联</strong>
              <span>把物种放回真实生态位</span>
            </div>
          </div>
        </aside>

        <section class="chat-panel">
          <header class="chat-header">
            <div>
              <h2 id="chatTitle">动物学问答</h2>
              <p>直接提问，回答会流式输出并保存到后端</p>
            </div>
            <button id="clearChat" class="icon-button" type="button" title="清空当前对话" aria-label="清空当前对话">
              <span aria-hidden="true">C</span>
            </button>
          </header>

          <div id="messages" class="messages" aria-live="polite"></div>

          <div class="examples" aria-label="示例问题">
            <button type="button">帮我介绍一下雪豹，顺便说下它和花豹有什么区别。</button>
            <button type="button">猫咪为什么会踩奶？</button>
            <button type="button">花豹 vs 美洲豹，怎么快速分辨？</button>
            <button type="button">如果海獭数量下降，海带森林会发生什么？</button>
          </div>

          <form id="chatForm" class="composer">
            <textarea
              id="promptInput"
              rows="2"
              placeholder="输入你想了解的动物、行为或对比问题..."
              aria-label="输入问题"
              required
            ></textarea>
            <button id="sendButton" type="submit">发送</button>
          </form>
        </section>
      </section>
    </main>

    <script src="/src/main.js" type="module"></script>
  </body>
</html>
